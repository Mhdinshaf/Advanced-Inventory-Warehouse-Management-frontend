<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 relative">
  
  <div class="flex justify-between items-center mb-6">
    <div class="flex gap-2 w-1/2">
      <input type="text" placeholder="Search by Product ID..." 
             class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button class="bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-700 transition">
        Search
      </button>
    </div>
    
    <button  class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2">
      <span>+</span> Add New Product
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-100 text-gray-600 text-sm uppercase">
          <th class="p-4 border-b">ID</th>
          <th class="p-4 border-b">Product Name</th>
          <th class="p-4 border-b">Category</th>
          <th class="p-4 border-b">Price</th>
          <th class="p-4 border-b text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr class="hover:bg-gray-50 border-b transition">
          <td class="p-4">1</td>
          <td class="p-4 font-medium text-gray-800">Casio G-Shock</td>
          <td class="p-4 text-gray-500">Watches</td>
          <td class="p-4">Rs. 45,000</td>
          <td class="p-4 text-center">
            <button class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded hover:bg-yellow-200 mr-2 text-sm font-medium transition">Edit</button>
            <button class="bg-red-100 text-red-700 px-3 py-1 rounded hover:bg-red-200 text-sm font-medium transition">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="isModalOpen" class="fixed inset-0  bg-black bg-opacity-50 z-50 flex justify-center items-center transition-opacity">
    
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up">
      <div class="bg-slate-800 px-6 py-4 flex justify-between items-center">
        <h3 class="text-white font-bold text-lg">Add / Update Product</h3>
        <button  class="text-gray-300 hover:text-white text-xl font-bold">&times;</button>
      </div>

      <div class="p-6">
        <form class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
            <input type="text" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Category ID</label>
            <input type="number" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Price</label>
              <input type="number" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
              <input type="number" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
        </form>
      </div>

      <div class="bg-gray-50 px-6 py-4 border-t flex justify-end gap-3">
        <button class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100 transition">Cancel</button>
        <button class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">Save Product</button>
      </div>
    </div>

  </div>

</div>
